name: Automated Preprocessing Pipeline

on:
  push:
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_*.py'
    branches:
      - main
  pull_request:
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_*.py'
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn

      - name: Run preprocessing automation
        run: |
          python preprocessing/automate_Baharudin-Yusuf.py
        continue-on-error: true

      - name: Commit and push preprocessed data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A preprocessing/namadataset_preprocessing/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated preprocessing: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
        continue-on-error: true

      - name: Upload preprocessed data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/namadataset_preprocessing/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Preprocessing executed successfully!'
            })
